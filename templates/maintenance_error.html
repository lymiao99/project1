{% extends "layout.html" %}

{% block content %}
<div
    style="background: rgba(15, 23, 42, 0.72); border: 1px solid rgba(148, 163, 184, 0.12); border-radius: 18px; padding: 24px; box-shadow: 0 14px 30px rgba(0, 0, 0, 0.16); backdrop-filter: blur(10px);">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color: #f8fafc; font-size: 2rem; margin: 0;">設備記錄異常處理清單</h2>
        <div style="display: flex; gap: 10px;">
            <button onclick="resetFilters()"
                style="padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #cbd5e1; cursor: pointer; font-size: 0.9rem;">重設篩選</button>
            <button onclick="fetchErrors(1)" class="btn-primary"
                style="padding: 8px 30px; border-radius: 8px; border: none; background: #3b82f6; color: white; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: all 0.2s; white-space: nowrap;">
                搜尋 / 重新整理 </button>
        </div>
    </div>

    <!-- 搜尋篩選區 -->
    <div
        style="display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
        <div style="flex: 1; min-width: 150px;">
            <label style="display: block; color: #94a3b8; font-size: 0.85rem; margin-bottom: 8px;">設備類型</label>
            <select id="filter-type" onchange="fetchErrors(1)"
                style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white;">
                <option value="">全部</option>
                <option value="L">L (Low)</option>
                <option value="M">M (Medium)</option>
                <option value="H">H (High)</option>
            </select>
        </div>
        <div style="flex: 1; min-width: 150px;">
            <label style="display: block; color: #94a3b8; font-size: 0.85rem; margin-bottom: 8px;">狀態</label>
            <select id="filter-status" onchange="fetchErrors(1)"
                style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white;">
                <option value="">全部</option>
                <option value="0" selected>待處理</option>
                <option value="1">已處理</option>
            </select>
        </div>
        <div style="flex: 2; min-width: 300px;">
            <label style="display: block; color: #94a3b8; font-size: 0.85rem; margin-bottom: 8px;">最後更新日期 (從 ~
                到)</label>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="date" id="filter-start-date"
                    style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white;">
                <span style="color: #64748b;">~</span>
                <input type="date" id="filter-end-date"
                    style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white;">
            </div>
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; text-align: left; color: #cbd5e1; font-size: 0.95rem;">
            <thead>
                <tr style="border-bottom: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255,255,255,0.02);">
                    <th style="padding: 14px 12px; font-weight: 600; color: #94a3b8;">UDI</th>
                    <th style="padding: 14px 12px; font-weight: 600; color: #94a3b8;">設備類型</th>
                    <th style="padding: 14px 12px; font-weight: 600; color: #94a3b8;">建議行動 / 備註</th>
                    <th style="padding: 14px 12px; font-weight: 600; color: #94a3b8;">狀態</th>
                    <th style="padding: 14px 12px; font-weight: 600; color: #94a3b8;">最後更新者</th>
                    <th style="padding: 14px 12px; font-weight: 600; color: #94a3b8;">最後更新時間</th>
                    <th style="padding: 14px 12px; font-weight: 600; color: #94a3b8; text-align: right;">操作</th>
                </tr>
            </thead>
            <tbody id="error-list-body">
                <tr>
                    <td colspan="7" style="text-align: center; padding: 30px; color: #64748b;">資料載入中...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 分頁區 -->
    <div id="pagination-controls"
        style="display: flex; justify-content: space-between; align-items: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
        <div style="color: #64748b; font-size: 0.9rem;">
            共 <span id="total-records" style="color: #cbd5e1; font-weight: 600;">0</span> 筆紀錄
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button id="prev-page" onclick="changePage(-1)"
                style="padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #cbd5e1; cursor: pointer; transition: all 0.2s;">上一頁</button>
            <span style="color: #94a3b8; font-size: 0.95rem; white-space: nowrap; flex-shrink: 0;">
                第<span id="current-page" style="color: #f8fafc; font-weight: 600;">1</span> / <span
                    id="total-pages">1</span> 頁</span>
            <button id="next-page" onclick="changePage(1)"
                style="padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #cbd5e1; cursor: pointer; transition: all 0.2s;">下一頁</button>
        </div>
    </div>
</div>

<!-- 編輯視窗 -->
<div id="editModal"
    style="display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.78); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center;">
    <div
        style="background: #1e293b; border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 500px; border-radius: 16px; padding: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
        <h3 style="color: white; margin-top: 0; margin-bottom: 20px; font-size: 1.25rem;">編輯異常建議與狀態</h3>

        <input type="hidden" id="edit-udi">

        <div style="margin-bottom: 20px;">
            <label style="display: block; color: #94a3b8; font-size: 0.9rem; margin-bottom: 8px;">建議行動
                (Recommendation)</label>
            <textarea id="edit-recommendation" rows="4"
                style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; resize: vertical; box-sizing: border-box;"></textarea>
        </div>

        <div style="display: flex; gap: 12px; justify-content: flex-end;">
            <button onclick="closeEditModal()"
                style="padding: 10px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #cbd5e1; cursor: pointer; font-weight: 600;">取消</button>
            <button onclick="saveEdit()"
                style="padding: 10px 16px; border-radius: 8px; border: none; background: #10b981; color: white; cursor: pointer; font-weight: 600;">儲存並標記處理
                (Process_flag=1)</button>
        </div>
    </div>
</div>

<script>
    let currentErrors = [];
    let currentPage = 1;
    let totalPages = 1;

    async function fetchErrors(page = 1) {
        // 防止傳入 Event 物件 (從監聽器觸發時)
        if (typeof page !== 'number') page = 1;

        currentPage = page;
        const type = document.getElementById('filter-type').value;
        const status = document.getElementById('filter-status').value;
        const startDate = document.getElementById('filter-start-date').value;
        const endDate = document.getElementById('filter-end-date').value;

        try {
            const tbody = document.getElementById('error-list-body');
            const url = `/api/maintenance-error?page=${page}&limit=10&type=${type}&status=${status}&start_date=${startDate}&end_date=${endDate}`;
            const res = await fetch(url);
            const result = await res.json();

            if (result.success) {
                currentErrors = result.data;
                totalPages = result.pages;

                document.getElementById('total-records').innerText = result.total;
                document.getElementById('current-page').innerText = result.page;
                document.getElementById('total-pages').innerText = result.pages;

                // 控制按鈕狀態
                document.getElementById('prev-page').disabled = result.page <= 1;
                document.getElementById('next-page').disabled = result.page >= result.pages;
                document.getElementById('prev-page').style.opacity = result.page <= 1 ? '0.5' : '1';
                document.getElementById('next-page').style.opacity = result.page >= result.pages ? '0.5' : '1';

                renderTable();
            } else {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #ef4444; padding: 20px;">載入失敗: ${result.error}</td></tr>`;
            }
        } catch (err) {
            console.error(err);
        }
    }

    function changePage(delta) {
        const next = currentPage + delta;
        if (next >= 1 && next <= totalPages) {
            fetchErrors(next);
        }
    }

    function resetFilters() {
        document.getElementById('filter-type').value = '';
        document.getElementById('filter-status').value = '';
        document.getElementById('filter-start-date').value = '';
        document.getElementById('filter-end-date').value = '';
        fetchErrors(1);
    }

    function renderTable() {
        const tbody = document.getElementById('error-list-body');
        tbody.innerHTML = '';

        if (currentErrors.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 30px; color: #64748b;">目前沒有異常紀錄</td></tr>';
            return;
        }

        currentErrors.forEach(err => {
            const tr = document.createElement('tr');
            tr.style.borderBottom = '1px solid rgba(255, 255, 255, 0.05)';

            const isProcessed = err.process_flag === 1;
            const statusBadge = isProcessed
                ? '<span style="padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3);">已處理</span>'
                : '<span style="padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3);">待處理</span>';

            const userRole = "{{ session.get('user_info', {}).get('role') }}";
            const editButton = userRole === 'MANAGER'
                ? ''
                : `<button onclick="openEditModal(${err.udi})" style="padding: 6px 12px; border-radius: 6px; border: none; background: rgba(255,255,255,0.1); color: white; cursor: pointer; font-size: 0.85rem; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">📝 編輯</button>`;

            tr.innerHTML = `
                <td style="padding: 16px 12px; font-weight: 600; color: #f8fafc;">${err.udi}</td>
                <td style="padding: 16px 12px;">${err.type || ''}</td>
                <td style="padding: 16px 12px; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${err.recommendation || '-'}</td>
                <td style="padding: 16px 12px;">${statusBadge}</td>
                <td style="padding: 16px 12px;">${err.last_update_by || '-'}</td>
                <td style="padding: 16px 12px; font-size: 0.85rem;">${err.last_update_date || '-'}</td>
                <td style="padding: 16px 12px; text-align: right;">
                    ${editButton}
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function openEditModal(udi) {
        const err = currentErrors.find(e => e.udi === udi);
        if (!err) return;

        document.getElementById('edit-udi').value = udi;
        document.getElementById('edit-recommendation').value = err.recommendation || '';
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() {
        document.getElementById('editModal').style.display = 'none';
    }

    async function saveEdit() {
        const udi = document.getElementById('edit-udi').value;
        const recommendation = document.getElementById('edit-recommendation').value;

        try {
            const res = await fetch('/api/maintenance-error/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ udi: parseInt(udi), recommendation })
            });
            const result = await res.json();

            if (result.success) {
                closeEditModal();
                fetchErrors(); // 重新撈取資料
            } else {
                alert('更新失敗: ' + result.error);
            }
        } catch (err) {
            console.error(err);
            alert('系統錯誤');
        }
    }

    // 初始化時載入資料
    document.addEventListener('DOMContentLoaded', () => {
        // 設定迄日期預設為今天
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('filter-end-date').value = today;

        fetchErrors(1);
    });
</script>
{% endblock %}
